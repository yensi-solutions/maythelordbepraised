services:
  mongo:
    image: mongo:7
    ports:
      - "${MONGODB_PORT:-15783}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: mongosh --eval 'db.runCommand("ping").ok' --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-15784}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak-db:
    image: postgres:16-alpine
    ports:
      - "${KEYCLOAK_DB_PORT:-15786}:5432"
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-change-me}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    ports:
      - "${KEYCLOAK_PORT:-15785}:8080"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-change-me}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-change-me}
    command: start-dev --import-realm
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /health/ready HTTP/1.1\r\nhost: localhost\r\n\r\n' >&3;timeout 1 cat <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 15

  minio:
    image: minio/minio:latest
    ports:
      - "${MINIO_API_PORT:-15787}:9000"
      - "${MINIO_CONSOLE_PORT:-15788}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "${BACKEND_PORT:-15782}:${BACKEND_PORT:-15782}"
    volumes:
      - ./backend/app:/app/app:delegated
      - ./backend/tests:/app/tests:delegated
    environment:
      MONGODB_URL: mongodb://mongo:27017
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-maythelordbepraised}
      REDIS_URL: redis://redis:6379
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-mtlbp}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-mtlbp-api}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-change-me}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_changeme}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_changeme}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-mtlbp-uploads}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      BACKEND_PORT: ${BACKEND_PORT:-15782}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  pastor-portal:
    build:
      context: ./frontend
      dockerfile: apps/pastor-portal/Dockerfile.dev
    ports:
      - "${PASTOR_PORTAL_PORT:-15780}:${PASTOR_PORTAL_PORT:-15780}"
    volumes:
      - ./frontend/apps/pastor-portal/src:/app/apps/pastor-portal/src:delegated
      - ./frontend/packages/shared/src:/app/packages/shared/src:delegated
    environment:
      VITE_API_URL: http://localhost:${BACKEND_PORT:-15782}/api/v1
      VITE_KEYCLOAK_URL: http://localhost:${KEYCLOAK_PORT:-15785}
      VITE_KEYCLOAK_REALM: ${KEYCLOAK_REALM:-mtlbp}
      VITE_KEYCLOAK_CLIENT_ID: mtlbp-pastor-portal
    depends_on:
      - backend

  follower-portal:
    build:
      context: ./frontend
      dockerfile: apps/follower-portal/Dockerfile.dev
    ports:
      - "${FOLLOWER_PORTAL_PORT:-15781}:${FOLLOWER_PORTAL_PORT:-15781}"
    volumes:
      - ./frontend/apps/follower-portal/src:/app/apps/follower-portal/src:delegated
      - ./frontend/packages/shared/src:/app/packages/shared/src:delegated
    environment:
      VITE_API_URL: http://localhost:${BACKEND_PORT:-15782}/api/v1
      VITE_KEYCLOAK_URL: http://localhost:${KEYCLOAK_PORT:-15785}
      VITE_KEYCLOAK_REALM: ${KEYCLOAK_REALM:-mtlbp}
      VITE_KEYCLOAK_CLIENT_ID: mtlbp-follower-portal
    depends_on:
      - backend

volumes:
  mongo_data:
  redis_data:
  keycloak_db_data:
  minio_data:
